name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ci/requirements.txt

      - name: Install CI dependency
        run: python -m pip install --disable-pip-version-check -r ci/requirements.txt

      - name: Repository and portable tests
        run: bash scripts/portable-ci.sh
